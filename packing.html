<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge Bay Packing List · Proffitt July 2026</title>
<style>
:root {
  --accent: #1e6b8a;
  --accent-light: #e4f1f6;
  --accent-dark: #15506b;
  --text: #1a2530;
  --muted: #5a6a7a;
  --bg: #f5f8fa;
  --card-bg: #ffffff;
  --border: #d6dde3;
  --green: #2e7d52;
  --green-light: #e6f4ec;
  --warn-bg: #fff8e1;
  --warn-border: #f59f00;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; }

/* Header */
.hero {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  color: white;
  padding: 24px 20px 20px;
  border-radius: 12px;
  margin-bottom: 16px;
}
.hero .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.8; margin-bottom: 6px; }
.hero h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
.hero .sub { font-size: 14px; opacity: 0.9; margin-bottom: 14px; line-height: 1.5; }
.hero .meta { display: flex; flex-wrap: wrap; gap: 8px; }
.hero .badge {
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 600;
}

/* Progress bar */
.progress-wrap { background: var(--card-bg); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; border: 1px solid var(--border); }
.progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: var(--accent-dark); }
.progress-bar-bg { background: var(--accent-light); border-radius: 6px; height: 10px; overflow: hidden; }
.progress-bar-fill { background: var(--accent); height: 100%; border-radius: 6px; transition: width 0.3s ease; }
.progress-counts { font-size: 12px; color: var(--muted); margin-top: 6px; display: flex; gap: 16px; flex-wrap: wrap; }
.progress-counts span { display: flex; align-items: center; gap: 4px; }

/* Warning callout */
.callout {
  background: var(--warn-bg);
  border: 1.5px solid var(--warn-border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 16px;
  font-size: 14px;
  line-height: 1.6;
}
.callout .callout-title { font-weight: 700; color: #7a5000; margin-bottom: 4px; font-size: 14px; }
.callout p { color: #5a3c00; }

/* Section headers */
.section {
  background: var(--card-bg);
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: 14px;
  overflow: hidden;
}
.section-header {
  padding: 14px 16px;
  background: var(--accent-light);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.section-header-left { display: flex; align-items: center; gap: 10px; }
.section-emoji { font-size: 22px; line-height: 1; }
.section-title { font-size: 15px; font-weight: 700; color: var(--accent-dark); line-height: 1.3; }
.section-subtitle { font-size: 12px; color: var(--muted); font-weight: 500; }
.section-count {
  background: var(--accent);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 12px;
  white-space: nowrap;
  flex-shrink: 0;
}
.section-count.done { background: var(--green); }
.section-body { padding: 4px 0 8px; }

/* Sub-section label */
.sub-label {
  padding: 10px 16px 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
}

/* Checklist items */
.item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid #f0f4f7;
  cursor: pointer;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
.item:last-child { border-bottom: none; }
.item:active { background: var(--accent-light); }
.item.checked { background: var(--green-light); }
.item.checked .item-text { color: var(--muted); text-decoration: line-through; text-decoration-color: #aac; }
.item.checked .item-note { color: #9ab; }

.checkbox {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  border: 2px solid var(--border);
  background: white;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: all 0.15s;
}
.item.checked .checkbox {
  background: var(--green);
  border-color: var(--green);
}
.checkbox-check {
  display: none;
  color: white;
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
}
.item.checked .checkbox-check { display: block; }

.item-content { flex: 1; min-width: 0; }
.item-text { font-size: 15px; color: var(--text); line-height: 1.4; }
.item-note { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.item-warn { font-size: 12px; color: #7a5000; font-weight: 600; margin-top: 2px; }

/* Don't-forget shortlist */
.shortlist {
  background: var(--card-bg);
  border: 2px solid var(--accent);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 14px;
}
.shortlist h3 { font-size: 14px; font-weight: 700; color: var(--accent-dark); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.shortlist-items { display: flex; flex-direction: column; gap: 6px; }
.shortlist-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  background: var(--accent-light);
  border-radius: 8px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
.shortlist-item.checked { background: var(--green-light); }
.shortlist-item.checked .shortlist-text { color: var(--muted); text-decoration: line-through; }
.shortlist-checkbox {
  width: 22px; height: 22px;
  border-radius: 5px;
  border: 2px solid var(--accent);
  background: white;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: white;
  transition: all 0.15s;
}
.shortlist-item.checked .shortlist-checkbox { background: var(--green); border-color: var(--green); }
.shortlist-text { font-size: 14px; font-weight: 600; color: var(--accent-dark); line-height: 1.3; }
.shortlist-item.checked .shortlist-text { color: var(--muted); }

/* Reset button */
.reset-wrap { text-align: center; margin-top: 24px; }
.reset-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 13px;
  padding: 9px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
}
.reset-btn:active { background: var(--bg); }

/* Footer */
.footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 24px; font-style: italic; }

@media (min-width: 480px) {
  .hero h1 { font-size: 26px; }
  .item { padding: 11px 18px; }
  .section-header { padding: 14px 18px; }
}
</style>
</head>

<script>
// --- State ---
const STORAGE_KEY = 'proffitt-packing-2026';

function saveState() {
  const state = {};
  document.querySelectorAll('.item').forEach((el, i) => {
    state['item-' + i] = el.classList.contains('checked');
  });
  document.querySelectorAll('.shortlist-item').forEach((el, i) => {
    state['short-' + i] = el.classList.contains('checked');
  });
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  let state = {};
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}
  document.querySelectorAll('.item').forEach((el, i) => {
    if (state['item-' + i]) el.classList.add('checked');
  });
  document.querySelectorAll('.shortlist-item').forEach((el, i) => {
    if (state['short-' + i]) el.classList.add('checked');
  });
}

// --- Toggle ---
function toggleItem(el) {
  el.classList.toggle('checked');
  updateCounts();
  saveState();
}

function toggleShortlist(el) {
  el.classList.toggle('checked');
  const cb = el.querySelector('.shortlist-checkbox');
  cb.textContent = el.classList.contains('checked') ? '✓' : '';
  saveState();
}

// --- Section toggle (collapse/expand) ---
function toggleSection(bodyId, header) {
  const body = document.getElementById(bodyId);
  const isHidden = body.style.display === 'none';
  body.style.display = isHidden ? 'block' : 'none';
}

// --- Counts ---
function getSectionItems(bodyId) {
  return document.getElementById(bodyId).querySelectorAll('.item');
}

const sections = [
  { body: 'shelter-body', count: 'count-shelter' },
  { body: 'kitchen-body', count: 'count-kitchen' },
  { body: 'comfort-body', count: 'count-comfort' },
  { body: 'clothing-body', count: 'count-clothing' },
  { body: 'toiletries-body', count: 'count-toiletries' },
  { body: 'power-body', count: 'count-power' },
  { body: 'bear-body', count: 'count-bear' },
  { body: 'daypack-body', count: 'count-daypack' },
  { body: 'buy-body', count: 'count-buy' },
];

function updateCounts() {
  let totalDone = 0, totalAll = 0;
  sections.forEach(({ body, count }) => {
    const items = document.getElementById(body).querySelectorAll('.item');
    const done = Array.from(items).filter(i => i.classList.contains('checked')).length;
    const el = document.getElementById(count);
    el.textContent = done + ' / ' + items.length;
    el.className = 'section-count' + (done === items.length && items.length > 0 ? ' done' : '');
    totalDone += done;
    totalAll += items.length;
  });
  const pct = totalAll > 0 ? Math.round((totalDone / totalAll) * 100) : 0;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('pct-label').textContent = pct + '%';
  document.getElementById('done-count').textContent = totalDone;
  document.getElementById('left-count').textContent = totalAll - totalDone;
}

function resetAll() {
  if (!confirm('Reset all checkboxes?')) return;
  document.querySelectorAll('.item').forEach(el => el.classList.remove('checked'));
  document.querySelectorAll('.shortlist-item').forEach(el => {
    el.classList.remove('checked');
    el.querySelector('.shortlist-checkbox').textContent = '';
  });
  updateCounts();
  saveState();
}

// --- Init ---
loadState();
updateCounts();
// Restore shortlist checkmark text for checked items
document.querySelectorAll('.shortlist-item.checked').forEach(el => {
  el.querySelector('.shortlist-checkbox').textContent = '✓';
});
</script>
